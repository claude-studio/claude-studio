name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set version from tag
        run: |
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('apps/studio/package.json')); p.version='$VERSION'; fs.writeFileSync('apps/studio/package.json', JSON.stringify(p, null, 2)+'\n');"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @repo/shared build; pnpm --filter @repo/ui build; true

      - name: Build & publish Electron app (macOS)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm --filter @repo/studio build && cd apps/studio && pnpm exec electron-builder --mac --publish always

      - name: Append install notes to release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          NOTES=$(gh release view "$TAG" --json body -q '.body')
          APPEND=$(cat <<'NOTES_EOF'

          ---

          ## 설치 안내

          ### macOS — "손상됨" 오류 해결

          Apple 공증(Notarization)을 받지 않은 앱은 Gatekeeper가 차단합니다.
          앱을 Applications 폴더로 이동한 뒤 터미널에서 아래 명령어를 실행하세요.

          ```bash
          xattr -cr /Applications/Claude\ Studio.app
          ```
          NOTES_EOF
          )
          gh release edit "$TAG" --notes "${NOTES}${APPEND}"

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set version from tag
        shell: bash
        run: |
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('apps/studio/package.json')); p.version='$VERSION'; fs.writeFileSync('apps/studio/package.json', JSON.stringify(p, null, 2)+'\n');"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @repo/shared build; pnpm --filter @repo/ui build; true
        shell: bash

      - name: Build & publish Electron app (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm --filter @repo/studio build && cd apps/studio && pnpm exec electron-builder --win --publish always

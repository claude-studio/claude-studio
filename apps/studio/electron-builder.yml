appId: com.claude-studio.app
productName: Claude Studio
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - "!node_modules/**/*"
publish:
  provider: github
  releaseType: draft
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}

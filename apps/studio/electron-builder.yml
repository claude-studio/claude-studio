appId: com.claude-studio.app
productName: Claude Studio
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - "!node_modules/**/*"
extraResources:
  - from: resources/plugin
    to: plugin
publish:
  provider: github
  owner: claude-studio
  repo: claude-studio
  releaseType: release
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
